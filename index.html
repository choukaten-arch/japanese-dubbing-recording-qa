<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="description" content="日語配音逐句錄音與評分 QA 測試站">
  <title>錄音評分 QA｜日語配音練習站</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="qa.css?v=20260721.6">
  <link rel="stylesheet" href="platform-bridge.css?v=20260721.6">
  <script src="config.js?v=20260721.6"></script>
  <script src="radar-chart.js?v=20260721.6"></script>
  <script src="sound-demo.js?v=20260721.6" defer></script>
  <script src="qa.js?v=20260721.6" defer></script>
  <script src="platform-bridge.js?v=20260721.6" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true">声</span><span>日語配音錄音 QA</span></a>
      <span class="qa-badge">獨立測試版</span>
    </div>
  </header>

  <main class="page-shell">
    <section class="work-heading" aria-labelledby="pageTitle">
      <div>
        <p class="eyebrow">錄音評分流程測試</p>
        <h1 id="pageTitle">魔女宅急便</h1>
        <p class="work-meta" id="workMeta">載入時間軸</p>
      </div>
      <div class="mode-status"><span class="status-dot"></span><span id="evaluationMode">瀏覽器測試評分</span></div>
    </section>

    <div class="practice-grid">
      <section class="reference-panel" aria-labelledby="referenceHeading">
        <div class="panel-heading">
          <h2 id="referenceHeading">示範台詞</h2>
          <span id="linePosition">—</span>
        </div>
        <div class="video-shell">
          <video id="referenceVideo" controls playsinline preload="metadata"></video>
          <div class="video-loading" id="videoLoading">載入示範影片</div>
          <div class="karaoke-overlay" id="karaokeOverlay" hidden>
            <div class="karaoke-caption">
              <div class="karaoke-japanese" id="karaokeJapanese" lang="ja"></div>
              <p class="karaoke-translation" id="karaokeTranslation" lang="zh-Hant"></p>
            </div>
            <div class="karaoke-guide" id="karaokeGuide" data-state="waiting">
              <span id="karaokeGuideLabel">準備開始</span>
              <span class="karaoke-guide-track" aria-hidden="true"><i id="karaokeGuideBar"></i></span>
            </div>
          </div>
        </div>
        <div class="reference-controls">
          <button class="icon-button" id="previousLine" type="button" title="上一句" aria-label="上一句">⏮</button>
          <button class="command-button" id="playReference" type="button"><span aria-hidden="true">▶</span>播放示範</button>
          <button class="icon-button" id="nextLine" type="button" title="下一句" aria-label="下一句">⏭</button>
        </div>
        <article class="selected-line">
          <div class="line-meta"><span class="role-name" id="selectedRole">—</span><span id="selectedTime">00:00.000</span></div>
          <p class="line-japanese" id="selectedJapanese" lang="ja">—</p>
          <p class="line-translation" id="selectedTranslation" lang="zh-Hant"></p>
        </article>
      </section>

      <section class="record-panel" aria-labelledby="recordHeading">
        <div class="panel-heading">
          <h2 id="recordHeading">本句錄音</h2>
          <span class="privacy-note">本次錄音可回放</span>
        </div>
        <div class="recorder-stage">
          <div class="record-status"><span id="recordState">準備錄音</span><strong id="recordTimer">00:00.0</strong></div>
          <canvas id="waveform" width="800" height="160" aria-label="麥克風音量波形"></canvas>
          <div class="record-actions">
            <button class="record-button" id="startRecording" type="button"><span class="record-symbol" aria-hidden="true">●</span>開始配音</button>
            <button class="stop-button" id="stopRecording" type="button" disabled><span aria-hidden="true">■</span>停止</button>
          </div>
          <div class="recording-review" id="recordingReview" hidden>
            <div class="recording-review-heading">
              <strong>我的錄音</strong>
              <button class="command-button" id="playSyncedReview" type="button" disabled><span aria-hidden="true">▶</span>搭配影片回看</button>
            </div>
            <audio id="recordingPlayback" controls preload="metadata" aria-label="播放我的錄音" hidden></audio>
          </div>
        </div>

        <div class="transcription-field">
          <label for="recognizedText">辨識結果</label>
          <textarea id="recognizedText" rows="3" lang="ja" placeholder="錄音後自動填入，也可以手動修正"></textarea>
          <span id="recognitionStatus">尚未錄音</span>
        </div>

        <div class="submit-row">
          <button class="evaluate-button" id="evaluateRecording" type="button" disabled>送出評分</button>
          <button class="reset-button" id="resetRecording" type="button" disabled>重新錄音</button>
        </div>

        <section class="result-panel" id="resultPanel" aria-labelledby="resultHeading" hidden>
          <div class="result-summary">
            <div><span class="result-label">本句分數</span><strong id="overallScore">—</strong></div>
            <span class="result-mode" id="resultMode">QA 測試分數</span>
          </div>
          <h3 id="resultHeading">評分明細</h3>
          <canvas class="practice-radar result-radar" id="performanceRadar" width="600" height="520" aria-label="重音、語調、語速、音量四面向雷達圖"></canvas>
          <div class="score-rows" id="scoreRows"></div>
          <div class="text-comparison"><span>台詞比對</span><p id="textDiff" lang="ja"></p></div>
          <ul class="issue-list" id="issueList"></ul>
        </section>
      </section>
    </div>

    <section class="script-panel" aria-labelledby="scriptHeading">
      <div class="panel-heading">
        <h2 id="scriptHeading">選擇測試台詞</h2>
        <span id="visibleCount">—</span>
      </div>
      <div class="script-toolbar">
        <input id="searchLines" type="search" placeholder="搜尋台詞" aria-label="搜尋台詞">
        <select id="roleFilter" aria-label="篩選角色"><option value="">全部角色</option></select>
      </div>
      <div class="line-list" id="lineList"></div>
    </section>

    <p class="fatal-state" id="fatalState" hidden>QA 資料載入失敗，請重新整理頁面。</p>
  </main>
</body>
</html>
